const { useState, useEffect } = React;

function usePersistedState(key, initial) {
  const [v, setV] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw !== null ? JSON.parse(raw) : initial;
    } catch (e) { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {}
  }, [v]);
  return [v, setV];
}

            {sectionHeader("3", "SwirlForce Surf Ace", "#A8B5C5")}
            <div style={{ background: "#161616", border: "1px solid #2A2A2A", borderRadius: 5, padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, flexWrap: "wrap" }}>
                <div style={{ fontFamily: fontDisp, fontSize: 16, fontWeight: 700, color: "#F0E8D8" }}>SwirlForce Surf Ace</div>
                <span style={{ fontFamily: fontMono, fontSize: 11, color: "#10B981" }}>{swirlforce.cost}</span>
              </div>
              <p style={{ fontSize: 13, color: "#999", lineHeight: 1.6, margin: 0, fontFamily: fontBody }}>{swirlforce.what}</p>
            </div>

            <div style={{ ...eyebrow(), marginBottom: 8 }}>SwirlForce upgrades</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {swirlforce.upgrades.map((u, i) => (
                <div key={i} className="pws-row" style={{ background: "#161616", border: "1px solid #2A2A2A", borderRadius: 5, padding: "11px 14px" }}>
                  <div style={{ fontFamily: fontDisp, fontSize: 13, fontWeight: 700, color: "#CFCFCF", marginBottom: 4 }}>{u.name}</div>
                  <div style={{ fontSize: 12, color: "#999", lineHeight: 1.55, fontFamily: fontBody }}>{u.desc}</div>
                </div>
              ))}
            </div>

            {sectionHeader("4", "Extensions", "#A8B5C5")}
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {extensions.map((e, i) => (
                <div key={i} className="pws-row" style={{ background: "#161616", border: "1px solid #2A2A2A", borderRadius: 5, padding: "11px 14px" }}>
                  <div style={{ display: "flex", gap: 14, alignItems: "baseline", flexWrap: "wrap" }}>
                    <div style={{ fontFamily: fontMono, fontSize: 9, color: "#444", minWidth: 28 }}>#{(i+1).toString().padStart(2,"0")}</div>
                    <div style={{ fontFamily: fontDisp, fontSize: 14, fontWeight: 700, color: "#F0E8D8", flex: "0 0 200px" }}>{e.name}</div>
                    <div style={{ fontSize: 12, color: "#999", flex: 1, lineHeight: 1.55, minWidth: 200, fontFamily: fontBody }}>{e.desc}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ fontFamily: fontMono, fontSize: 10, color: "#444", marginTop: 8, letterSpacing: "0.04em", lineHeight: 1.6 }}>
              ↳ All extensions reduce area-of-effect slightly. Cost ratio: short 1× · long 2× · extra long 4×.<br />
              ↳ Some levels provide ladders, scaffolds, scissor lifts, or abseiling apparatus — substitutes for the Extra Long Extension on those levels.
            </div>
          </div>
        )}

        {/* PART II */}
        {part === "tactics" && (
          <div>
            {partHeader("II", "Field Tactics", "Priorities, verdicts, and what to do with the equipment from Part I.", "#D9B36A")}

            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 14, marginBottom: 4, fontFamily: fontMono, fontSize: 10, color: "#666", letterSpacing: "0.08em" }}>
              <span>§1 Brand choice</span><span>·</span>
              <span>§2 Nozzle priority</span><span>·</span>
              <span>§3 Extensions</span><span>·</span>
              <span>§4 SwirlForce</span><span>·</span>
              <span>§5 Couch co-op</span>
            </div>

            {sectionHeader("1", "Choose your brand and commit", "#D9B36A")}
            {["vista", "urban"].map(b => {
              const l = washerLines[b];
              return (
                <div key={b} style={{ background: "#161616", border: `1px solid ${l.color}33`, borderRadius: 6, padding: "16px 18px", marginBottom: 10 }}>
                  <div style={{ fontFamily: fontDisp, fontSize: 16, fontWeight: 700, color: l.color, marginBottom: 12 }}>{l.name}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
                    <div>
                      <div style={{ ...eyebrow("#16A34A"), marginBottom: 8 }}>Strengths</div>
                      {brandPros[b].map((p, i) => (
                        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 7, alignItems: "flex-start" }}>
                          <span style={{ color: "#16A34A", flexShrink: 0, fontSize: 13, lineHeight: 1.4 }}>✓</span>
                          <div style={{ fontSize: 12, color: "#CCC", lineHeight: 1.5, fontFamily: fontBody }}>{p}</div>
                        </div>
                      ))}
                    </div>
                    <div>
                      <div style={{ ...eyebrow("#DC2626"), marginBottom: 8 }}>Limitations</div>
                      {brandCons[b].map((c, i) => (
                        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 7, alignItems: "flex-start" }}>
                          <span style={{ color: "#DC2626", flexShrink: 0, fontSize: 13, lineHeight: 1.4 }}>✕</span>
                          <div style={{ fontSize: 12, color: "#CCC", lineHeight: 1.5, fontFamily: fontBody }}>{c}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{ background: "#1A1A1A", border: "1px solid #2A2A2A", borderLeft: "3px solid #D9B36A", borderRadius: "0 5px 5px 0", padding: "12px 16px", fontSize: 12, color: "#CCC", lineHeight: 1.55, fontFamily: fontBody }}>
              <span style={{ ...eyebrow("#D9B36A"), marginRight: 8 }}>Verdict</span>
              {brandVerdict}
            </div>

            {sectionHeader("2", "Nozzle priorities", "#D9B36A")}
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {nozzlePriority.map((n, i) => (
                <div key={i} className="pws-row pws-card-hover" style={{ background: "#161616", border: "1px solid #2A2A2A", borderLeft: `3px solid ${n.pColor}`, borderRadius: "0 5px 5px 0", padding: "10px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
                    <div style={{ fontFamily: fontDisp, fontSize: 13, fontWeight: 700, color: "#F0E8D8", flex: "1 0 140px" }}>{n.name}</div>
                    <span style={{ fontFamily: fontMono, fontSize: 10, color: n.pColor, background: n.pColor + "18", padding: "2px 8px", borderRadius: 3, letterSpacing: "0.06em" }}>{n.priority}</span>
                  </div>
                  {n.note && <div style={{ fontSize: 12, color: "#999", marginTop: 5, lineHeight: 1.55, fontFamily: fontBody }}>{n.note}</div>}
                </div>
              ))}
            </div>

            {sectionHeader("3", "Extension verdicts", "#D9B36A")}
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {extensionVerdicts.map((e, i) => (
                <div key={i} className="pws-row pws-card-hover" style={{ background: "#161616", border: "1px solid #2A2A2A", borderLeft: `3px solid ${e.vColor}`, borderRadius: "0 5px 5px 0", padding: "11px 14px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 4 }}>
                    <div style={{ fontFamily: fontDisp, fontSize: 14, fontWeight: 700, color: "#F0E8D8", flex: "1 0 160px" }}>{e.name}</div>
                    <span style={{ fontFamily: fontMono, fontSize: 10, color: e.vColor, background: e.vColor + "22", padding: "2px 8px", borderRadius: 3, letterSpacing: "0.06em" }}>{e.verdict}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#999", lineHeight: 1.55, fontFamily: fontBody }}>{e.rationale}</div>
                </div>
              ))}
            </div>

            {sectionHeader("4", "SwirlForce strategy", "#D9B36A")}
            <ol style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 5 }}>
              {swirlforceTactics.map((t, i) => (
                <li key={i} style={{ background: "#161616", border: "1px solid #2A2A2A", borderLeft: "3px solid #10B981", borderRadius: "0 5px 5px 0", padding: "11px 14px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontFamily: fontMono, fontSize: 11, color: "#10B981", minWidth: 18 }}>{i + 1}.</span>
                  <span style={{ fontSize: 12, color: "#CCC", lineHeight: 1.55, fontFamily: fontBody }}>{t}</span>
                </li>
              ))}
            </ol>

            {sectionHeader("5", "Couch co-op tactics", "#D9B36A")}
            <div style={{ background: "#180900", border: "1px solid #F9731644", borderRadius: 5, padding: "13px 16px", marginBottom: 10 }}>
              <div style={{ ...eyebrow("#F97316"), marginBottom: 6 }}>Same couch, same screen</div>
              <p style={{ fontSize: 13, color: "#AAA", lineHeight: 1.6, margin: 0, fontFamily: fontBody }}>
                Communication is free here — point at the screen, call zones, react instantly. These tactics assume that.
              </p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {coopTips.map((t, i) => (
                <div key={i} className="pws-row pws-card-hover" style={{ background: "#161616", border: "1px solid #2A2A2A", borderLeft: "3px solid #F97316", borderRadius: "0 5px 5px 0", padding: "11px 14px", display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 16, flexShrink: 0, lineHeight: 1.3 }}>{t.icon}</span>
                  <div>
                    <div style={{ fontFamily: fontDisp, fontSize: 13, fontWeight: 700, color: "#F0E8D8", marginBottom: 3 }}>{t.title}</div>
                    <div style={{ fontSize: 12, color: "#999", lineHeight: 1.55, fontFamily: fontBody }}>{t.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PART III */}
        {part === "campaign" && (
          <div>
            {partHeader("III", "Campaign", "The most efficient path through Caldera County, plus the economy that constrains it.", "#D27C9E")}

            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 14, marginBottom: 4, fontFamily: fontMono, fontSize: 10, color: "#666", letterSpacing: "0.08em" }}>
              <span>§1 Economy</span><span>·</span>
              <span>§2 The 8-step path</span>
            </div>

            {sectionHeader("1", "Economy", "#D27C9E")}
            <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 6 }}>
              {economy.map((e, i) => (
                <div key={i} style={{ background: e.bg, border: `1px solid ${e.swatch}33`, borderRadius: 5, padding: "11px 14px", display: "flex", gap: 14, alignItems: "flex-start", flexWrap: "wrap" }}>
                  <div style={{ fontFamily: fontMono, fontSize: 11, color: e.swatch, minWidth: 150, letterSpacing: "0.04em" }}>{e.label}</div>
                  <div style={{ fontSize: 12, color: "#BBB", flex: 1, lineHeight: 1.55, minWidth: 200, fontFamily: fontBody }}>{e.desc}</div>
                </div>
              ))}
            </div>

            {sectionHeader("2", "The 8-step optimal path", "#D27C9E")}
            <p style={{ fontSize: 11, color: "#666", margin: "0 0 12px", fontFamily: fontMono, letterSpacing: "0.04em" }}>↳ Deviating isn't wrong — but this is the most efficient run.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
              {plan.map((p) => (
                <div key={p.step} className="pws-row pws-card-hover" style={{ background: "#161616", border: "1px solid #2A2A2A", borderLeft: `3px solid ${p.color}`, borderRadius: "0 5px 5px 0", padding: "12px 14px", display: "flex", gap: 14, alignItems: "flex-start" }}>
                  <div style={{ fontFamily: fontMono, fontSize: 16, fontWeight: 500, color: p.color, minWidth: 26, paddingTop: 1, lineHeight: 1 }}>{p.step.toString().padStart(2,"0")}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: fontDisp, fontSize: 14, fontWeight: 700, color: "#F0E8D8", marginBottom: 4 }}>{p.title}</div>
                    <div style={{ fontSize: 12, color: "#999", lineHeight: 1.6, fontFamily: fontBody }}>{p.detail}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Quick Reference */}
        <div style={{ marginTop: 32, borderTop: "1px solid #2A2A2A", paddingTop: 22 }}>
          <div style={{ ...eyebrow(), marginBottom: 14 }}>Quick reference · jump to a part</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 8, marginBottom: 18 }}>
            {parts.map((p) => (
              <div key={p.id} onClick={() => setPart(p.id)}
                style={{ background: p.id === part ? p.bg : "#161616", border: `1px solid ${p.id === part ? p.color : "#2A2A2A"}`, borderRadius: 4, padding: "12px 14px", cursor: "pointer", transition: "all 0.2s" }}>
                <div style={{ fontFamily: fontMono, fontSize: 10, color: p.color, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>Part {p.numeral}</div>
                <div style={{ fontFamily: fontDisp, fontSize: 16, fontWeight: 700, color: p.id === part ? p.accent : "#CFCFCF", marginBottom: 3 }}>{p.label}</div>
                <div style={{ fontSize: 11, color: p.id === part ? p.accent : "#777", lineHeight: 1.45, fontFamily: fontBody }}>{p.subtitle}</div>
              </div>
            ))}
          </div>

          <div style={{ ...eyebrow(), marginBottom: 10 }}>Common lookups</div>
          <div style={{ background: "#161616", border: "1px solid #2A2A2A", borderRadius: 5, overflow: "hidden" }}>
            {quickReference.map((q, i) => {
              const p = parts.find(x => x.id === q.partId);
              return (
                <div key={i} onClick={() => setPart(q.partId)}
                  style={{ display: "flex", gap: 14, alignItems: "center", padding: "10px 14px", borderBottom: i < quickReference.length - 1 ? "1px solid #222" : "none", cursor: "pointer", flexWrap: "wrap" }}>
                  <span style={{ fontFamily: fontMono, fontSize: 9, color: p.color, letterSpacing: "0.1em", minWidth: 36 }}>{p.numeral}</span>
                  <span style={{ fontSize: 12, color: "#CFCFCF", flex: "1 0 200px", fontFamily: fontBody }}>{q.lookup}</span>
                  <span style={{ fontFamily: fontMono, fontSize: 11, color: "#888", flex: "0 1 auto" }}>{q.answer}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Footer */}
      <div style={{ borderTop: "1px solid #2A2A2A", padding: "12px 24px", background: "#1A1A1A", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontFamily: fontMono, fontSize: 10, color: "#3A3A3A", letterSpacing: "0.06em" }}>
          PWS2 · Caldera County · Couch Co-op Field Guide
        </div>
        <div style={{ fontFamily: fontMono, fontSize: 10, color: "#3A3A3A", letterSpacing: "0.1em" }}>
          Part {parts.find(p => p.id === part)?.numeral} of III
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PWS2Guide />);

  </script>
</body>
</html>
